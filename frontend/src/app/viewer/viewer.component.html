<main class="viewer-page">
    <section class="viewer-shell">
        <div class="viewer-actions">
            <a class="primary-action" routerLink="/search">Back to search</a>
        </div>

        <header class="viewer-hero">
            <h1 class="viewer-title">{{ title }}</h1>
            <!-- <p class="viewer-filename">{{ filename }}</p> -->
        </header>

        <section class="viewer-content">
            <div *ngIf="isLoading" class="loading">Loading...</div>
            <div *ngIf="error" class="error">{{ error }}</div>
            <div class="file-content" #fileContentContainer *ngIf="!isLoading && !error">
                <div class="file-line" *ngFor="let line of fileLines" [ngClass]="{
                    'mus-line': line.tag === 'mus',
                    'en-line': line.tag === 'en',
                    'highlight-line': line.highlight
                }">
                    <span class="line-number">{{ line.lineIndex + 1 }}</span>
                    <span class="line-text">{{ line.text }}</span>
                </div>
            </div>
        </section>
    </section>
</main>
