<main class="page">
    <div class="page-content">
        <section class="other-demos" aria-label="Other demo links">
            <h2>Other Demos</h2>
            <div class="other-demos__links">
                <a class="other-demos__button" routerLink="/speech-recognition">Speech Recognition</a>
                <a class="other-demos__button" href="/read-a-longs">Read-a-longs</a>
                <a class="other-demos__button" routerLink="/creek-fm">CreekFM</a>
            </div>
        </section>
        <section class="search-card" aria-label="Search the corpus">
            <h1>Search</h1>
            <p>Search the Mvskoke corpus</p>
            <form class="search-form" action="/search" method="get">
                <label class="sr-only" for="corpus-search">Search</label>
                <input id="corpus-search" name="query" type="search" placeholder="Enter search word or phrase" />
                <button type="submit">Search</button>
            </form>
            <div class="example-searches" aria-label="Example searches">
                <span class="example-searches__label">Example searches</span>
                <div class="example-searches__chips">
                    <button type="button" routerLink="/search" [queryParams]="{ query: 'mēkusvpkv' }">mēkusvpkv</button>
                    <button type="button" routerLink="/search"
                        [queryParams]="{ query: 'semvnolvlke' }">semvnolvlke</button>
                    <button type="button" routerLink="/search" [queryParams]="{ query: 'church' }">church</button>
                    <button type="button" routerLink="/search" [queryParams]="{ query: 'osafke' }">osafke</button>
                </div>
            </div>
        </section>

    </div>
</main>
