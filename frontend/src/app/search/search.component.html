<main class="results-page">
    <section class="results-shell" aria-label="Search results">
        <div class="results-actions">
            <a class="primary-action" routerLink="/">Home</a>
        </div>
        <header class="results-hero">
            <p class="eyebrow">Search</p>
            <form class="results-search" (ngSubmit)="onSearchSubmit()">
                <label class="sr-only" for="results-search-input">Search</label>
                <input id="results-search-input" type="search" [(ngModel)]="searchTerm" name="query"
                    placeholder="Search again" />
                <button type="submit">Search</button>
            </form>
            <div class="example-searches" aria-label="Example searches" *ngIf="!searchTerm.trim()">
                <span class="example-searches__label">Try:</span>
                <div class="example-searches__chips">
                    <a class="example-searches__pill" *ngFor="let term of exampleSearchTerms" [routerLink]="['/search']"
                        [queryParams]="{ query: term }">
                        {{ term }}
                    </a>
                </div>
            </div>
        </header>
        <section class="results-panel" aria-label="Result list" *ngIf="searchTerm.trim() && !isLoading && !error">
            <h2>{{ resultHeading }}</h2>
            <div class="results-meta">
                <span>{{ results.length }} matches</span>
                <span>Corpus preview</span>
            </div>

            <article class="result-card" *ngFor="let result of results">
                <div class="result-card__header">
                    <h2>{{ result.title }}</h2>
                    <p class="location">{{ result.type }}</p>
                </div>
                <p class="excerpt">{{ result.excerpt }}</p>
                <p class="excerpt_subtitle">{{ result.excerpt_subtitle }}</p>

            </article>
        </section>

        <div class="loading-container" *ngIf="isLoading" aria-live="polite" aria-label="Loading search results">
            <div class="spinner"></div>
            <p class="loading-text">Searching the corpus...</p>
        </div>

        <div class="error-message" *ngIf="error" role="alert">
            <p>{{ error }}</p>
        </div>
    </section>
</main>
